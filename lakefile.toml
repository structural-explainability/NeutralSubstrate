# ============================================================
# lakefile.toml
# ============================================================
# Declares the public Lean package identity, import surface,
# build targets, dependencies, and verification executables.

# ============================================================
# PROJECT IDENTITY
# ============================================================

name = "NeutralSubstrate"

# REQ.PROJECT.VERSION
#   Increment only for externally visible logical changes.
version = "0.1.0"

# REQ.PROJECT.LICENSE
#   Open license permitting reuse of formal artifacts.
license = "MIT"

# REQ.PROJECT.KEYWORDS
#   Discovery metadata for Lean, GitHub, and academic indexing.
#   CUSTOM: Adjust to reflect repository scope.
keywords = [
  "structural-explainability",
  "accountability",
  "ontological-neutrality",
  "neutral-substrate",
  "formal-specification",
  "formal-verification",
  "proof-carrying",
  "theorem-proving",
  "lean4"
]

# ============================================================
# BUILD SURFACE
# ============================================================
# defaultTargets must include the public Lean library root.

defaultTargets = ["NeutralSubstrate"]

# ============================================================
# PUBLIC LIBRARY
# ============================================================
# Downstream Lean projects import this library root.
# Lake discovers modules under the matching source directory.

[[lean_lib]]
name = "NeutralSubstrate"

# ============================================================
# EXECUTABLES
# ============================================================
# Export executables generate machine-readable contract artifacts.

[[lean_exe]]
name = "verify"
root = "Main"
